name: zephyr-arm
adopt-info: toolchain
build-base: ubuntu@24.04
summary: Zephyr Toolchain
description: |
  This SDK provides the ARM cross-compiler toolchain for building Zephyr
  firmware targeting the arm-zephyr-eabi target triple. Use this SDK
  alongside the zephyr base SDK.
license: Apache-2.0
platforms:
  amd64:

slots:
  toolchain:
    interface: mount
    workshop-source: $SDK
parts:
  toolchain:
    plugin: dump
    source: .
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      curl -fLO "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${VERSION}/toolchain_gnu_linux-x86_64_arm-zephyr-eabi.tar.xz"
      tar -xf "toolchain_gnu_linux-x86_64_arm-zephyr-eabi.tar.xz" --strip-components=1 -C "$CRAFT_PART_SRC"
      rm -f "toolchain_gnu_linux-x86_64_arm-zephyr-eabi.tar.xz"
